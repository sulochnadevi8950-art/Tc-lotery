<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Aviator Game Demo</title>\n    <style>\n        body {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            background-color: #f4f4f4;\n            font-family: Arial, sans-serif;\n        }\n        #game {\n            width: 300px;\n            height: 300px;\n            border: 2px solid #000;\n            position: relative;\n        }\n        .plane {\n            width: 50px;\n            height: 50px;\n            background-color: red;\n            position: absolute;\n            bottom: 0;\n            left: calc(50% - 25px);\n        }\n    </style>\n</head>\n<body>\n    <div id="game">\n        <div class="plane"></div>\n    </div>\n    <script>\n        let plane = document.querySelector('.plane');\n        let game = document.getElementById('game');\n        let interval;\n        let height = 0;\n        function startGame() {\n            height += 5;\n            plane.style.bottom = height + 'px';\n            if (height < 250) {\n                interval = setTimeout(startGame, 100);\n            } else {\n                clearTimeout(interval);\n            }\n        }\n        game.addEventListener('click', startGame);\n    </script>\n</body>\n</html>
